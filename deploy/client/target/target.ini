[connector]
; Linux VM that runs operator/listener.py. Use the VM hostname or IP reachable
; from the Windows target (course server, lab DNS, etc.).
operator_host = cs448lnx132.gcc.edu
operator_port = 47001

; Short identifier shown in operator logs. Leave blank to use the OS hostname.
client_name = lab-01

; Initial reconnect delay (seconds). Backoff doubles up to max_reconnect_seconds.
reconnect_seconds = 5
max_reconnect_seconds = 60

; Socket read timeout while idle between commands. Large values keep the
; session open across quiet periods; set lower to detect dead peers faster
; at the cost of more reconnect noise.
recv_timeout_seconds = 3600

[media]
; Directory containing cv2_hack.py and media files. Relative paths are resolved
; against the folder that holds this INI file (usually target/).
project_root = ..

; Used when operator sends PLAY with no path (optional).
default_video = giraffe_clipped.mp4
default_audio = giraffe_clipped_audio.mp3
